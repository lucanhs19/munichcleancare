<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050506"/>
      <stop offset="0.55" stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#14141b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.55" cy="0.25" r="0.7">
      <stop offset="0" stop-color="#d6b47a" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#d6b47a" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#d6b47a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seat" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#1a1a22"/>
      <stop offset="1" stop-color="#0d0d12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6b47a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f1e6d1" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.10" stroke="#ffffff">
    <path d="M0 760H1600" opacity="0.25"/>
    <path d="M0 660H1600" opacity="0.18"/>
    <path d="M0 560H1600" opacity="0.12"/>
    <path d="M220 0V1000" opacity="0.12"/>
    <path d="M420 0V1000" opacity="0.10"/>
    <path d="M620 0V1000" opacity="0.08"/>
    <path d="M820 0V1000" opacity="0.06"/>
    <path d="M1020 0V1000" opacity="0.05"/>
    <path d="M1220 0V1000" opacity="0.04"/>
  </g>

  <!-- abstract interior shapes -->
  <g transform="translate(150,140)">
    <path d="M260 560c-24-210 40-370 190-430 126-51 290-18 365 82 64 84 78 220 45 372-25 115-94 187-197 212-139 34-323-12-403-112z" fill="url(#seat)" stroke="#ffffff" stroke-opacity="0.10"/>
    <path d="M355 240c70-72 210-85 295-28 76 51 104 156 86 266-17 105-62 177-141 205-99 34-246 10-318-67-78-84-78-292 78-376z" fill="#0b0b10" opacity="0.9"/>
    <path d="M210 700c120-78 300-68 440 8 140 76 265 68 415-35" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    <circle cx="990" cy="155" r="90" fill="#d6b47a" opacity="0.10" filter="url(#soft)"/>
    <circle cx="1040" cy="210" r="55" fill="#f1e6d1" opacity="0.10" filter="url(#soft)"/>
  </g>

  <g opacity="0.65">
    <text x="70" y="930" fill="#f3f4f6" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="30" letter-spacing="4">
      PLATZHALTERBILD
    </text>
    <text x="70" y="965" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="20">
      Innenraum " Premium Look " Austauschbar unter /public/images/
    </text>
  </g>
</svg>

